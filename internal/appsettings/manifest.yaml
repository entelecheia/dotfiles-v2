# App settings backup manifest.
# Paths are relative to $HOME/Library/. type=pref|support|container|group
# for discoverability; all types are treated identically by the engine.

apps:
  - token: 1password
    paths:
      - {type: pref,      path: "Preferences/com.1password.1password.plist"}
      - {type: group,     path: "Group Containers/2BUA8C4S2C.com.1password"}

  - token: raycast
