# Binary extensions for rsync workspace sync
# Only these file types are synced between Mac and remote server.
# Text files (.md, .py, .yaml, etc.) use git exclusively.
#
# --- Documents ---
*.pdf
*.hwp
*.hwpx
*.doc
*.docx
*.ppt
*.pptx
*.ppsx
*.pps
*.xls
*.xlsx
*.xlsm
*.key
# --- Images ---
*.png
*.jpg
*.jpeg
*.heic
*.ai
# --- Audio ---
*.mp3
*.wav
*.ogg
*.flac
# --- Video ---
*.mp4
*.mov
*.avi
*.mkv
*.srt
# --- Archives ---
*.zip
*.tar
*.tar.gz
*.tgz
*.gz
*.zst
# --- Data & ML ---
*.parquet
*.pkl
*.pth
*.pt
*.tsv
