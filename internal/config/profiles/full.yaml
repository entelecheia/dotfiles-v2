extends: minimal

modules:
  node:
    enabled: true
  workspace:
    enabled: true
  ai:
    enabled: true
  tmux:
    enabled: true
  fonts:
    enabled: true
    family: FiraCode
  conda:
    enabled: true
  gpg:
    enabled: true
  secrets:
    enabled: true
  terminal:
    enabled: true
    warp: true
    prompt_style: rich
    apps:
      - warp
  macapps:
    enabled: true
    # Cask list is pulled from the embedded catalog (internal/config/catalog/macos-apps.yaml).
    # Override casks / casks_extra at the Config level to install a custom set.

casks_extra:
  - anchor

packages_extra:
  - anchor-cli
  - btop
  - lazygit
  - rclone
  - yazi
  - glow
  - csvlens
  - chafa
  - fnm
  - uv
  - pipx
  - tmux
  - gnupg
