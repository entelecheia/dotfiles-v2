version: 2

builds:
  - main: ./cmd/dotfiles
    binary: dotfiles
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
    env:
      - CGO_ENABLED=0

archives:
  - format: tar.gz
    name_template: "dotfiles_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: entelecheia
    name: dotfiles-v2
  extra_files:
    - glob: scripts/install.sh
