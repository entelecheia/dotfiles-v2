version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
  settings:
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - std-error-handling
    rules:
      # Test fixtures intentionally ignore setup errors guarded by t.Fatal elsewhere.
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
