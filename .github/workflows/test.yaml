name: Test
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/**"
      - ".goreleaser.yaml"
  pull_request:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "scripts/**"
      - "tests/**"

jobs:
  unit:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Unit tests with coverage
        run: go test ./... -race -count=1 -coverprofile=coverage.out
      - name: Build binary
        run: go build -o bin/dotfiles ./cmd/dotfiles/
      - run: ./bin/dotfiles --help
      - run: ./bin/dotfiles version
      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck
      - name: Shellcheck install script
        run: shellcheck scripts/install.sh
      - run: bash -n scripts/install.sh
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  integration:
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        dockerfile: [ubuntu-22.04, ubuntu-24.04]
        profile: [minimal, full, server]
        include:
          # Minimal/server-stripped base image — only meaningful for server profile.
          - dockerfile: server
            profile: server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go build -o dotfiles ./cmd/dotfiles/
      - name: Build image + run profile
        env:
          TAG: dotfiles-test:${{ matrix.dockerfile }}
        run: |
          docker build -t "$TAG" -f "tests/Dockerfile.${{ matrix.dockerfile }}" .
          docker run --rm "$TAG" /tests/run-profile.sh "${{ matrix.profile }}"

  linux:
    # Combined module + scenario suite: one image build, N fresh-container runs.
    needs: unit
    runs-on: ubuntu-latest
    env:
      TAG: dotfiles-test:linux
      MODULES: "packages shell node git ssh terminal tmux ai conda"
      SCENARIOS: "dry-run-all-profiles init-and-apply idempotency server-profile upgrade-check home-override workspace drive-exclude sync install-script"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go build -o dotfiles ./cmd/dotfiles/
      - run: docker build -t "$TAG" -f tests/Dockerfile.ubuntu-22.04 .
      - name: Modules
        run: |
          failed=()
          for m in $MODULES; do
            echo "::group::module $m"
            if ! docker run --rm "$TAG" /tests/run-module.sh "$m"; then
              failed+=("$m")
              echo "::error::module $m failed"
            fi
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -gt 0 ]; then
            echo "failed modules: ${failed[*]}"
            exit 1
          fi
      - name: Scenarios
        if: always()
        run: |
          failed=()
          for s in $SCENARIOS; do
            echo "::group::scenario $s"
            if ! docker run --rm "$TAG" "/tests/scenarios/$s.sh"; then
              failed+=("$s")
              echo "::error::scenario $s failed"
            fi
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -gt 0 ]; then
            echo "failed scenarios: ${failed[*]}"
            exit 1
          fi

  apps-install-macos:
    needs: unit
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go build -o bin/dotfiles ./cmd/dotfiles/
      - name: Ensure jq is present
        run: command -v jq >/dev/null || brew install jq
      - name: Install defaults and verify /Applications
        run: bash tests/scenarios/apps-install-macos.sh
