name: Test
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            profile: full
          - os: ubuntu-24.04
            profile: full
          - os: ubuntu-24.04
            profile: minimal
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap (unattended)
        env:
          CHEZMOI_ARGS: "--no-tty --promptDefaults"
          DOTFILES_REPO: ${{ github.repository }}
          DOTFILES_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: bash scripts/bootstrap.sh

      - name: Verify core files
        run: |
          [ -f ~/.zshrc ]
          [ -f ~/.config/shell/00-exports.sh ]
          [ -f ~/.config/shell/10-aliases.sh ]
          [ -f ~/.config/git/config ]

      - name: Verify core tools
        run: |
          command -v git
          command -v fzf
          command -v rg
          command -v bat
          command -v eza
          command -v zoxide
          command -v starship

      - name: Verify full tools
        if: matrix.profile == 'full'
        run: |
          command -v lazygit
          command -v yazi
          command -v fnm
          command -v uv
